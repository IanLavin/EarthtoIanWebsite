<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location — Earth to Ian</title>
  <meta name="description" content="" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Earth to Ian" />
  <meta property="og:title" content="" />
  <meta property="og:description" content="" />
  <meta property="og:image" content="" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-location">

  <div class="menu-container">
    <button id="menu-toggle" class="menu-toggle" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav id="menu-dropdown" class="menu-dropdown">
      <a href="index.html">Home</a>
      <a href="countries.html">Countries</a>
      <a href="highpoints.html">Highpoints</a>
      <a href="national-parks.html">US National Parks</a>
      <a href="timeline.html">Timeline</a>
      <a href="Discover/index.html">Gallery</a>
      <a href="year-in-review.html">Year In Review</a>
      <a href="about.html">About</a>
    </nav>
  </div>

  <nav class="page-nav">
    <a href="index.html">&#8592; Back to Map</a>
    <button id="share-btn" class="share-btn" aria-label="Share this location">Share</button>
  </nav>

  <main class="location-page">

    <!-- Top banner -->
    <header class="location-banner">
      <div class="banner-left">
        <img id="hero-image" class="location-thumb" alt="" />
      </div>

      <div class="banner-title">
        <h1 id="location-title"></h1>
        <p id="location-subtitle" class="location-subtitle"></p>
        <p id="location-date-visited" class="location-date-visited" style="display:none"></p>
      </div>
    </header>

    <nav id="location-mini-nav" class="location-mini-nav">
      <a href="#overview">Overview</a>
      <a href="#hike-stats">Stats</a>
      <a href="#logistics-section">Logistics</a>
      <a href="#notes">Notes</a>
      <a href="#related">Related</a>
      <a href="#media">Media</a>
    </nav>

    <!-- Two-column layout -->
    <section class="location-grid">

      <!-- Left column: media -->
      <div id="media" class="location-media">
        <div id="location-carousel" class="carousel"></div>

        <section class="location-video">
          <h2>Video</h2>
          <div id="video-container"></div>
        </section>

        <!-- Journal under carousel -->
        <section class="location-journal">
          <h2>Journal</h2>
          <div id="journal-container"></div>
        </section>
      </div>

      <!-- Right column: writing -->
      <div class="location-writing">

        <section id="overview" class="location-overview">
          <h2>Overview</h2>
          <div id="description" class="markdown"></div>
        </section>

        <section id="hike-stats" class="location-hike-stats" style="display:none">
          <h2>Difficulty &amp; Stats</h2>
          <div id="hike-stats-container"></div>
        </section>

        <section id="elevation-profile" class="location-elevation-profile" style="display:none">
          <div class="elevation-section-header">
            <h2>Elevation Profile</h2>
            <div class="unit-toggle">
              <button class="unit-btn" data-unit="imperial">ft / mi</button>
              <button class="unit-btn" data-unit="metric">m / km</button>
            </div>
          </div>
          <div id="elevation-stats" class="elevation-stats"></div>
          <div id="elevation-svg-container"></div>
        </section>

        <section id="logistics-section" class="location-logistics">
          <h2>Logistics</h2>
          <div id="logistics" class="markdown"></div>
        </section>

        <section id="notes" class="location-notes">
          <h2>Notes</h2>
          <div id="notes-container" class="markdown"></div>
        </section>

        <section id="related" class="location-related">
          <h2>Related Locations</h2>
          <ul id="related-locations" class="related-locations-list"></ul>
        </section>

      </div>
    </section>
  </main>

  <button id="back-to-top" class="back-to-top" type="button" aria-label="Back to top">Top</button>

  <!-- Load once, at the end -->
  <script type="module" src="location.js"></script>

</body>
</html>
