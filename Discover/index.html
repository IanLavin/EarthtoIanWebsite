<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="../styles.css" />

</head>
<body class="page-gallery">

  <header class="topbar">
    <h1 id="page-title">Gallery</h1>
  </header>

  <div class="menu-container">
    <button id="menu-toggle" class="menu-toggle" aria-label="Open menu">
      <span></span>

      <span></span>
    </button>
    <nav id="menu-dropdown" class="menu-dropdown">
      <a href="../index.html">Home</a>
      <a href="../countries.html">Countries</a>

  <main class="gallery-page">
    <div class="gallery-controls">
      <input type="text" id="gallery-search" placeholder="Search locations..." autocomplete="off" />
      <div class="gallery-filters">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="park">Parks</button>
        <button class="filter-btn" data-category="mountain">Highpoints</button>
        <button class="filter-btn" data-category="adventure">Adventures</button>
        <button class="filter-btn" data-category="sightseeing">Sightseeing</button>
      </div>
      <p class="gallery-count" id="gallery-count"></p>
    </div>

    <div class="gallery-grid" id="gallery-grid"></div>
  </main>

  <script type="module" src="script.js"></script>
