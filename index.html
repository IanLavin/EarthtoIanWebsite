<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earth to Ian — Adventure Atlas</title>
  <meta name="description" content="An interactive travel atlas documenting national parks, state highpoints, and adventures around the world — with photos, journals, and trip details." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Earth to Ian" />
  <meta property="og:title" content="Earth to Ian — Adventure Atlas" />
  <meta property="og:description" content="An interactive travel atlas documenting national parks, state highpoints, and adventures around the world — with photos, journals, and trip details." />

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body class="page-home">

  <header class="topbar">
    <div class="title-badge">
      <p class="site-kicker">Adventure Atlas</p>
      <h1 class="site-title">
        Earth to Ian
        <span class="site-subtitle">Maps, mountains, and miles worth remembering</span>
      </h1>
    </div>
  </header>


  <!-- Hamburger Menu -->
  <div class="menu-container">
  <button id="menu-toggle" class="menu-toggle" aria-label="Open menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav id="menu-dropdown" class="menu-dropdown">
    <a href="index.html">Home</a>
    <a href="countries.html">Countries</a>
    <a href="highpoints.html">Highpoints</a>
    <a href="national-parks.html">US National Parks</a>
    <a href="timeline.html">Timeline</a>
      <a href="Discover/index.html">Gallery</a>
      <a href="year-in-review.html">Year In Review</a>
    <a href="about.html">About</a>
  </nav>
</div>


  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">

      <div class="sidebar-controls">
        <button id="homeButton" class="sidebar-btn">United States</button>
        <button id="worldButton" class="sidebar-btn">Worldwide</button>
      </div>

      <div class="map-style-toggle">
        <button class="map-style-btn active" data-style="satellite">Satellite</button>
        <button class="map-style-btn" data-style="terrain">Terrain</button>
      </div>

      <button id="routesToggle" class="routes-toggle-btn">Routes</button>

      <input type="text" id="searchBox" placeholder="Search..." />

      <div class="tabs" role="tablist" aria-label="Categories">
        <button class="tab active" data-category="all" role="tab" aria-selected="true">All</button>
        <button class="tab" data-category="park" role="tab" aria-selected="false">Parks</button>
        <button class="tab" data-category="mountain" role="tab" aria-selected="false">Highpoints</button>
        <button class="tab" data-category="adventure" role="tab" aria-selected="false">Adventures</button>
        <button class="tab" data-category="sightseeing" role="tab" aria-selected="false">Sightseeing</button>
      </div>

      <div id="year-filter" class="year-filter"></div>

      <ul id="sidebar-list" class="sidebar-list"></ul>

      <div id="random-location" class="highlight-card">
        <h3>Highlights</h3>
        <a id="random-location-link" href="#">
          <img id="random-location-img" src="" alt="Random Adventure" />
          <p id="random-location-name"></p>
        </a>
        <button id="surprise-me-btn" class="surprise-me-btn">Surprise Me</button>
      </div>

    </aside>

    <!-- Map -->
    <main class="map-area">
      <div id="map"></div>
      <button id="sidebar-drawer-toggle" class="sidebar-drawer-toggle" aria-label="Browse locations">
        Browse
      </button>
    </main>

  </div>

  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- App JS -->
  <script type="module" src="script.js"></script>
</body>
</html>
